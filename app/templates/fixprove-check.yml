# FixProve check workflow — Session 2.1 distributable template
# ==================================================================
#
# KS-TRACE: S2.1-ACTION-TEMPLATE | requirement: this is the workflow file a
# customer adds to THEIR OWN repository (as
# `.github/workflows/fixprove-check.yml`) after installing the FixProve
# GitHub App. It is what actually checks out and scans the customer's code
# on THEIR runner — the FixProve App's own backend never receives source
# code, only the findings JSON this workflow POSTs back at the end.
#
# KS-TRACE: S4.3-ACTION-REAL-INSTALL | requirement: closes the TODO Session
# 2.1 originally logged here. `fixprove` is now published for real to PyPI
# (confirmed live, Session 4.2) — this workflow installs it with a real
# `pip install fixprove` and continues invoking the engine via
# `python3 -m cli` (module invocation), exactly as it always did; the
# "cli" module ships as part of the `fixprove` PyPI distribution (see
# engine/python/pyproject.toml's `[tool.setuptools] py-modules` list, which
# explicitly includes "cli"). No npm/Node install is needed for the ENGINE
# itself: the npm `fixprove` package is a separate local-CLI convenience
# wrapper (see cli/src/commands/check.ts) that itself just shells out to
# `python3 -m cli` — this Action already invokes that same entry point
# directly, so installing the npm package here would be redundant. Node IS
# still needed below, but only to install the CUSTOMER's own JS/TS
# dependencies (see the S4.3-ACTION-TS-DEPS-DEFECT trace below) | test:
# manual cross-check against cli/src/commands/check.ts,
# engine/python/cli.py, engine/python/pyproject.toml — see KS-REPORT-4.3.

name: FixProve Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  # KS-TRACE: S2.1-ACTION-OIDC-PERMISSION | requirement: id-token: write is
  # what lets this workflow request a GitHub Actions OIDC token — the whole
  # reason the FixProve App never needs a shared secret from this repo.
  id-token: write

# KS-TRACE: S4.3-ACTION-TS-DEPS-DEFECT | requirement (Yehor sign-off
# pending -- flagged, not silently assumed): reproduced in a real sandbox
# (Session 4.3, see KS-REPORT-4.3) that ts_knowledge_base.py's
# build_package_entry() reports "not-installed" for every package whose
# folder is absent under node_modules/, and ts_resolver.py flags
# "not-installed" as a `dependency-not-installed` finding for EVERY symbol
# imported from it -- confirmed: a genuinely clean `import axios from
# "axios"` with node_modules missing is flagged as a false positive; the
# same file with `npm install` run first is clean. Since node_modules is
# gitignored in virtually every real repo, omitting a JS/TS dependency
# install step would false-positive-flag 100% of imports in any real TS/JS
# project on every single PR -- including RUNBOOK-LIVE-DEPLOYMENT.md's own
# B5 "adversarial: clean PR" case, which yehor.ai's half of this session's
# live test explicitly requires to pass clean. This is a genuinely new
# defect, not a previously-known/flagged limitation -- added here, but
# called out explicitly for review before Yehor pushes it live.
#
# KS-TRACE: S4.3-ACTION-PY-DEPS-DEFECT | requirement (Yehor sign-off
# pending, same class as S4.3-ACTION-TS-DEPS-DEFECT above): reproduced in
# a real sandbox (Session 4.3) that knowledge_base.py reports "not-
# installed" for a correctly `name==version`-pinned dependency if that
# package isn't ACTUALLY importable in the current interpreter -- and
# resolver.py flags "not-installed" as `dependency-not-installed` for
# EVERY symbol imported from it, exactly like the TS/JS case. Confirmed
# directly against a real customer requirements.txt
# (autonomous-core's own, at the time of this session: openai, langgraph,
# networkx, tree-sitter, python-dotenv, autopep8 -- all UNPINNED as
# shipped, which separately means zero findings are even possible until
# pinned; but pinning alone, without also installing, produces a false
# positive on totally valid `client = openai.OpenAI()` usage). This
# workflow never installed the CUSTOMER's own requirements.txt -- only
# `fixprove` itself. Fixed below with a symmetric "Install Python
# dependencies" step.

jobs:
  fixprove-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FixProve engine
        run: |
          pip install --break-system-packages fixprove

      - name: Install Python dependencies
        # See the S4.3-ACTION-PY-DEPS-DEFECT trace above the `permissions`
        # block for why this step exists at all: without it, EVERY pinned
        # dependency in the customer's own requirements.txt reports
        # "not-installed" and gets flagged as a false positive on
        # perfectly valid code, not just on a seeded hallucination.
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install --break-system-packages -r requirements.txt

      - name: Set up Node
        # Only matters if this repo has a package.json (TS/JS ecosystem);
        # harmless no-op cost otherwise. Pinned explicitly rather than
        # relying on the runner image's default Node version.
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS/TS dependencies
        # See the S4.3-ACTION-TS-DEPS-DEFECT trace above the `permissions`
        # block for why this step exists at all.
        if: hashFiles('package.json') != ''
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run fixprove check
        id: fixprove
        run: |
          python3 -m cli "${{ github.workspace }}" --json > fixprove-findings.json || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Request OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          # KS-TRACE: S2.1-ACTION-AUDIENCE | the `audience` value here MUST
          # match the `callbackAudience` the FixProve App was configured
          # with, or verifyGithubActionsOidcToken will reject the token
          # (see oidcVerify.ts) -- this is deliberate, not a bug: it scopes
          # the token to ONLY be usable against FixProve's callback, not
          # replayable against any other OIDC-verifying service.
          script: |
            const token = await core.getIDToken('https://fixprove.dev/callback');
            core.setOutput('token', token);

      - name: Report findings to FixProve
        run: |
          FINDINGS=$(cat fixprove-findings.json | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin).get('findings', [])))")
          curl -sf -X POST "https://api.fixprove.dev/callback" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${{ steps.oidc.outputs.token }}\", \"findings\": ${FINDINGS}}"
