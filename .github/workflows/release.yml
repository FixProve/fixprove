# #KS-TRACE: S3.1-RELEASE-WORKFLOW | requirement: "A GitHub Actions release
# workflow is defined to automate publishing to PyPI and npm on tag
# creation." Triggers on any tag matching v*.*.* (semver). Publishing is
# GATED behind the existing test suites for both packages -- a red test
# run must never reach a publish step.
#
# ASSUMPTION (AI-logged, pending Yehor override): uses PyPI's Trusted
# Publishing (OIDC, `id-token: write`, no stored token) for the Python
# package -- this requires Yehor to configure it ONCE on pypi.org (Project
# -> Publishing -> Add a new publisher, pointing at this repo/workflow/
# environment name) before the first real release. Chosen specifically
# because Session 0.1's own Keystone Report flagged a HIGH-severity defect
# (D4: a PyPI API token was pasted in plaintext in a chat session and had
# to be revoked) -- Trusted Publishing eliminates that entire class of
# risk by never having a long-lived PyPI token to leak in the first place.
# npm publishing uses npm's Trusted Publishing (OIDC, `id-token: write`,
# GA since 2025-07-31) as of Session 4.8 -- see S4.8-NPM-OIDC-MIGRATION
# below on the publish-npm job for the full trace. NPM_TOKEN is retained
# as a same-run automatic fallback during the transition window (Yehor
# decision, Session 4.8, Q3: phased rollout) -- it is NOT revoked until a
# real tag proves the OIDC path works end-to-end.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # KS-TRACE: S3.1-RELEASE-TEST-GATE | requirement: publishing must never
  # happen on the strength of an out-of-date or unverified build -- this
  # job re-runs the FULL existing test suites (TS monorepo via turbo, and
  # the Python engine via pytest) from a clean checkout of the tagged
  # commit, exactly as CI does on every push, before either publish job is
  # allowed to start (see `needs:` below).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install TS/JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspaces
        run: pnpm build

      - name: Typecheck all workspaces
        run: pnpm typecheck

      - name: Test all workspaces
        run: pnpm test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python engine test dependencies
        working-directory: engine/python
        run: pip install --break-system-packages -r requirements.txt

      # #KS-TRACE: S4.2-DEFECT-CORPUS-FIXTURES | requirement: fix the
      # v0.1.0 release-gate failure (2026-07-04) -- test_corpus_eval_reports_
      # perfect_precision_recall and test_ts_corpus_eval_reports_perfect_
      # precision_recall regressed to precision 0.143 / 8 false positives on
      # a clean GitHub Actions runner. ROOT CAUSE (confirmed by reproducing
      # both failures in a fresh sandbox venv/checkout with no prior
      # .fixprove_cache or ts_corpus/node_modules): the corpus eval's own
      # fixture dependencies (corpus/requirements.txt's pandas/requests/
      # fp-monkeypatch-demo, and ts_corpus/package.json's axios/lodash) were
      # NEVER installed by this workflow -- they only ever existed in
      # whatever ad hoc local environment validated Sessions 1.1-1.4. This
      # is a missing CI setup step, NOT resolver/KB logic drift. Fixed by
      # explicitly installing them here, the same way `pnpm test`/`pytest`
      # already assume their own real dependencies are present.
      # | test: test_corpus_eval_reports_perfect_precision_recall,
      #         test_ts_corpus_eval_reports_perfect_precision_recall
      - name: Install Python corpus-eval fixtures (real deps + local hard-exit fixture)
        working-directory: engine/python
        run: |
          set -e
          pip install --break-system-packages pandas==2.3.3 requests==2.34.2
          pip install --break-system-packages ./corpus/local_fixtures/fp-monkeypatch-demo
          # fastapi-helpers-fake is deliberately NEVER installed -- it is the
          # corpus's "dependency-not-installed" true-positive fixture (see
          # corpus/manifest.json and corpus/hallucinated/uninstalled_dependency.py).

      - name: Install TS/JS corpus-eval fixtures (real npm deps, not part of the pnpm workspace)
        working-directory: engine/python/ts_corpus
        run: npm ci

      - name: Test Python engine
        working-directory: engine/python
        run: python -m pytest tests/ -q

  # KS-TRACE: S3.1-RELEASE-ARTIFACT-ADVERSARIAL-GATE | requirement
  # (adversarial acceptance criterion): "packaging must not accidentally
  # include test files, fixtures, or internal corpora in the published
  # artifacts." This is not a one-time manual check -- it is a REPEATED,
  # AUTOMATED gate that runs on every single release, so a future change
  # to pyproject.toml/MANIFEST.in/package.json can never silently
  # reintroduce leakage without failing CI. Builds the REAL sdist+wheel
  # and the REAL npm tarball, then greps their member listings for
  # forbidden path fragments.
  verify-artifact-contents:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python sdist + wheel
        working-directory: engine/python
        run: |
          pip install --break-system-packages --quiet build
          python -m build

      - name: Verify Python artifacts exclude tests/corpora/eval scripts
        working-directory: engine/python
        run: |
          set -e
          SDIST=$(ls dist/*.tar.gz)
          WHEEL=$(ls dist/*.whl)
          echo "Inspecting $SDIST"
          tar tzf "$SDIST" | tee /tmp/sdist-listing.txt
          echo "Inspecting $WHEEL"
          python -m zipfile -l "$WHEEL" | tee /tmp/wheel-listing.txt
          for forbidden in "/tests/" "/corpus/" "/ts_corpus/" "eval_corpus.py" "eval_ts_corpus.py" ".pytest_cache" ".hypothesis" "__pycache__"; do
            if grep -qF "$forbidden" /tmp/sdist-listing.txt; then
              echo "::error::sdist contains forbidden path fragment: $forbidden"
              exit 1
            fi
            if grep -qF "$forbidden" /tmp/wheel-listing.txt; then
              echo "::error::wheel contains forbidden path fragment: $forbidden"
              exit 1
            fi
          done
          echo "OK: no test/fixture/corpus/eval leakage in Python artifacts."

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install + build cli/ for packing
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter fixprove build

      - name: Verify npm tarball excludes source/test files (only dist/ ships)
        working-directory: cli
        run: |
          set -e
          npm pack --dry-run --json > /tmp/npm-pack.json
          cat /tmp/npm-pack.json
          python3 - << 'PYEOF'
          import json
          data = json.load(open("/tmp/npm-pack.json"))
          files = [f["path"] for f in data[0]["files"]]
          forbidden_prefixes = ("src/", "test/", "dist/test/")
          leaked = [f for f in files if f.startswith(forbidden_prefixes)]
          if leaked:
              print(f"::error::npm tarball contains forbidden source/test files: {leaked}")
              raise SystemExit(1)
          print("OK: npm tarball contains only", files)
          PYEOF

  # KS-TRACE: S3.1-RELEASE-PYPI | Trusted Publishing (OIDC) -- see the
  # module-level trace above for why. `environment: pypi` matches the
  # environment name Yehor must configure on pypi.org's Trusted Publisher
  # setup (this is a one-time manual step, not automatable from here --
  # see this session's Keystone Report Known Limitations).
  publish-pypi:
    needs: verify-artifact-contents
    runs-on: ubuntu-latest
    environment: pypi
    # #KS-TRACE: S4.2-DEFECT-PUBLISH-PERMISSIONS | requirement: fix v0.1.1's
    # publish-pypi/publish-npm failure -- both jobs' `permissions:` blocks
    # listed ONLY `id-token: write`. In GitHub Actions, declaring a job-level
    # `permissions:` block REPLACES the entire default permission set rather
    # than adding to it, so `contents: read` (required by actions/checkout@v4)
    # silently dropped to `none` -- checkout then fails with a misleading
    # "repository not found" instead of a permissions error. This is a
    # pre-existing defect from Session 3.1, invisible until v0.1.1's run
    # because these jobs had never actually executed before (v0.1.0 died at
    # the earlier `test` gate). Fixed by adding `contents: read` explicitly.
    # | test: real GitHub Actions run (v0.1.2 tag) -- this class of defect
    # cannot be caught by local pytest/build checks, only a live workflow run.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        working-directory: engine/python
        run: |
          pip install --break-system-packages --quiet build
          python -m build

      - name: Publish to PyPI (Trusted Publishing, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: engine/python/dist

  # #KS-TRACE: S4.8-NPM-OIDC-MIGRATION | requirement: open item #1 carried
  # since Session 4.7 -- migrate off the bypass-2FA NPM_TOKEN before npm's
  # own deprecation timeline (restricted Aug 2026, eliminated Jan 2027).
  # Mirrors publish-pypi's existing OIDC approach. Verified against live
  # npm docs (docs.npmjs.com/trusted-publishers, GA since 2025-07-31) and
  # an independent real-world account (philna.sh, 2026-01-28) during this
  # session's Stage 1 intake -- NOT assumed from training-data recall,
  # since this feature postdates the AI's reliable knowledge cutoff.
  #
  # ASSUMPTIONS (AI-logged, Yehor-approved Session 4.8, Q1-Q4):
  # Q1 (Node/npm bump): belt-and-suspenders -- Node 24 via setup-node AND
  #   an explicit `npm install -g npm@latest` step. Docs require npm CLI
  #   >=11.5.1 + Node >=22.14.0; the field account found the version-bump
  #   claim alone insufficient in practice and needed the explicit global
  #   npm upgrade to get a working publish, so both are applied here as a
  #   deliberately redundant, low-cost hedge against exactly that gap.
  # Q2 (environment symmetry): `environment: npm` added, mirroring
  #   publish-pypi's `environment: pypi`, WITHOUT required-reviewer
  #   protection rules for now -- Yehor must create this GitHub Environment
  #   manually (Settings -> Environments -> New environment -> "npm");
  #   not automatable from here. Adding required reviewers later is a
  #   separate, deferred decision, not bundled into this change.
  # Q3 (phased rollout): NODE_AUTH_TOKEN is deliberately NOT removed from
  #   this step's env. npm's own docs state the CLI tries OIDC first and
  #   automatically falls back to a supplied token in the SAME run if OIDC
  #   fails -- so this is a live, same-run safety net, not just an
  #   emergency git-revert fallback. NPM_TOKEN stays live on npm's side too
  #   (no "disallow tokens" toggle) until a real tag proves OIDC actually
  #   fired. KNOWN CONSEQUENCE: a successful publish on the verification
  #   tag does NOT by itself prove OIDC worked -- it could have silently
  #   fallen through to the token. Stage 3 verification must inspect the
  #   job's own npm-publish log output for explicit evidence of the OIDC
  #   token exchange, not just check that the package went live.
  # Q4 (live verification): a real `v0.1.9` tag is pushed this session to
  #   verify the OIDC handshake live, per Yehor's explicit instruction --
  #   npm does not validate trusted-publisher config at save time, so this
  #   is the only way to actually verify it, consistent with this
  #   project's "unverified means unverified" standing rule.
  #
  # PRECONDITION (manual, Yehor-only, not automatable from here): a
  # Trusted Publisher must be configured at
  # https://www.npmjs.com/package/fixprove/access (NOT the generic
  # account-level packages settings page) with Organization/user
  # "FixProve", Repository "fixprove", Workflow filename "release.yml"
  # (exact, case-sensitive), Environment name "npm" (matching the GitHub
  # Environment above), and "npm publish" explicitly checked under Allowed
  # actions (configs created after 2026-05-20 do not default this on).
  # This MUST be done before the v0.1.9 tag is pushed, or the OIDC path
  # will not exist yet to fall back FROM.
  # | test: real GitHub Actions run on the v0.1.9 tag -- job log must show
  # explicit OIDC token exchange evidence (not inferred from publish
  # success alone); package page on npmjs.com must show a valid Sigstore
  # provenance attestation.
  publish-npm:
    needs: verify-artifact-contents
    runs-on: ubuntu-latest
    environment: npm
    # #KS-TRACE: S4.2-DEFECT-PUBLISH-PERMISSIONS | see publish-pypi's own
    # KS-TRACE above -- identical root cause and fix. id-token: write also
    # doubles as the OIDC permission required by S4.8-NPM-OIDC-MIGRATION.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      # #KS-TRACE: S4.8-NPM-OIDC-MIGRATION (Q1) | Node bumped from 20 to 24
      # for this job only -- trusted publishing requires Node >=22.14.0.
      # Other jobs (test, verify-artifact-contents) are intentionally left
      # on Node 20; only the publish step has the OIDC requirement.
      # ASSUMPTION: pnpm 9.12.0 is compatible with Node 24 -- not verified
      # in this sandbox (no live GitHub Actions runner access here); if
      # `pnpm install`/`pnpm --filter fixprove build` fails on Node 24 in
      # the real run, that is a new defect to log, not a silent revert to
      # Node 20.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # #KS-TRACE: S4.8-NPM-OIDC-MIGRATION (Q1) | explicit global npm
      # upgrade -- see the module-level KS-TRACE above for why this is
      # kept even though Node 24's bundled npm is expected to already
      # satisfy the >=11.5.1 requirement. Belt-and-suspenders, not
      # redundant ceremony: a real-world account found this step load-
      # bearing even on a recent Node/npm baseline.
      - name: Ensure npm CLI supports Trusted Publishing (>=11.5.1)
        run: npm install -g npm@latest

      - name: Install + build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter fixprove build

      # #KS-TRACE: S4.8-NPM-OIDC-MIGRATION (Q3) | --provenance kept
      # explicit (not relying on OIDC's "automatic" provenance claim --
      # see module-level KS-TRACE: a real-world account found the
      # automatic-provenance claim did not hold reliably in practice).
      # NODE_AUTH_TOKEN is deliberately still passed -- see module-level
      # KS-TRACE (Q3) for why this is a live same-run fallback, not dead
      # code to clean up.
      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
